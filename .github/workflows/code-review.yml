name: Automated Code Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write
  id-token: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            Review this pull request against the standards in CLAUDE.md.
            Post a single review comment grouping findings by severity
            (Blocking / Should-fix / Nit). Cite file and line, and suggest
            a concrete fix for each. Be concise.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 20
